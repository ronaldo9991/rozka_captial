version: 1.0
runtime: nodejs20

run:
  runtime-version: 20
  command: node -e "console.log('Starting server...'); const http = require('http'); const server = http.createServer((req, res) => { res.writeHead(200, {'Content-Type': 'text/plain'}); res.end('Binofox API is running!'); }); server.listen(8080, '0.0.0.0', () => console.log('Server listening on port 8080'));"
  network:
    port: 8080
