version: 1.0
runtime: nodejs20

# Minimal build configuration
build:
  commands:
    - echo "🚀 Building application..."
    - npm ci
    - echo "✅ Build complete!"

# Minimal runtime configuration
run:
  runtime-version: 20
  command: node -e "const http = require('http'); const server = http.createServer((req, res) => { res.writeHead(200, {'Content-Type': 'application/json'}); if (req.url === '/api/health') { res.end(JSON.stringify({status: 'healthy', timestamp: new Date().toISOString(), platform: 'AWS App Runner', message: 'Binofox API is running'})); } else { res.end(JSON.stringify({message: 'Binofox Trading Platform', status: 'running', url: req.url})); } }); server.listen(8080, '0.0.0.0', () => console.log('✅ Server running on port 8080'));"
  network:
    port: 8080

