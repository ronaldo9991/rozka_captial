version: 1.0
runtime: nodejs20

# Full-stack monorepo build configuration
build:
  commands:
    build:
      - echo "🚀 Building full-stack monorepo application..."
      - echo "📦 Installing dependencies..."
      - npm ci
      - echo "🔨 Building frontend (React/Vite)..."
      - npm run build:frontend
      - echo "🔨 Building backend (Express/TypeScript)..."
      - npm run build:backend
      - echo "✅ Build complete!"

# Production runtime configuration
run:
  runtime-version: 20
  command: npm run start:apprunner
  network:
    port: 8080
    env: PORT
  env:
    - name: NODE_ENV
      value: production
    - name: PORT
      value: "8080"
    # Session Configuration
    - name: SESSION_SECRET
      value: "binofox-production-session-secret-2025"
    # Frontend URL - Update with your App Runner URL after deployment
    - name: FRONTEND_URL
      value: "https://your-app-service.us-east-1.awsapprunner.com"
    # Optional: Add other variables as needed
    - name: SKIP_DATABASE
      value: "true"

# Health check configuration for AWS App Runner
health-check:
  path: /api/health
  interval: 30
  timeout: 5
  healthy-threshold: 2
  unhealthy-threshold: 3

# Auto-scaling configuration
auto-scaling:
  min-size: 1
  max-size: 10
  target-cpu-utilization: 70

# Security
security:
  iam-role: arn:aws:iam::ACCOUNT-ID:role/AppRunnerECRAccessRole

